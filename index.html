<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 깔끔한 사이트</title>
    <style>
        /* 디자인 부분: 군더더기 없는 미니멀 스타일 */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #ffffff;
        }
        header {
            border-bottom: 2px solid #eee;
            margin-bottom: 40px;
            padding-bottom: 20px;
        }
        h1 { font-size: 2rem; letter-spacing: -1px; }
        section { margin-bottom: 60px; }
        footer { font-size: 0.9rem; color: #888; margin-top: 100px; }
        
        /* 반응형 설정 */
        @media (max-width: 600px) {
            body { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>사이트 제목을 입력하세요</h1>
    </header>

    <section>
        <h2>소개</h2>
        <p>여기에 사이트의 목적이나 내용을 작성합니다. 불필요한 링크나 팝업 없이 텍스트 중심의 깔끔한 구성입니다.</p>
    </section>

    <section>
        <h2>주요 내용</h2>
        <ul>
            <li>첫 번째 핵심 정보</li>
            <li>두 번째 핵심 정보</li>
        </ul>
    </section>

    <footer>
        <p>&copy; 2026 내 이름. All rights reserved.</p>
    </footer>

</body>
</html>
